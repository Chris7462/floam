lidar_processing_node:
  ros__parameters:
    # Lidar parameters
    num_scan_lines: 64
    scan_period: 0.1  # seconds
    vertical_angle: 2.0  # degrees
    max_dist: 90.0  # meters
    min_dist: 2.0  # meters
    # Processing parameters
    processing_frequency: 50.0  # Hz
    max_processing_queue_size: 3  # Maximum number of queued point clouds
    # QoS parameters
    queue_size: 10
    # Topic parameters
    input_topic: "kitti/velo"
    output_filtered_topic: "lidar_cloud_filtered"
    output_edge_topic: "laser_cloud_edge"
    output_surf_topic: "laser_cloud_surf"

odom_estimation_node:
  ros__parameters:
    # Lidar parameters
    num_scan_lines: 64
    scan_period: 0.1  # seconds
    vertical_angle: 2.0  # degrees
    max_dist: 90.0  # meters
    min_dist: 2.0  # meters
    # Map parameters
    map_resolution: 0.4  # meters
    # Processing parameters
    processing_frequency: 50.0  # Hz
    max_processing_queue_size: 3  # Maximum number of queued point cloud pairs
    # QoS parameters
    queue_size: 10
    # Topic parameters
    input_edge_topic: "laser_cloud_edge"
    input_surf_topic: "laser_cloud_surf"
    output_odom_topic: "odom"
    output_path_topic: "odom_path"

lidar_mapping_node:
  ros__parameters:
    # Lidar parameters
    num_scan_lines: 64
    scan_period: 0.1  # seconds
    vertical_angle: 2.0  # degrees
    max_dist: 90.0  # meters
    min_dist: 2.0  # meters
    # Map parameters
    map_resolution: 0.4  # meters
    # Processing parameters
    processing_frequency: 50.0  # Hz
    max_processing_queue_size: 3  # Maximum number of queued cloud odom pairs
    # QoS parameters
    queue_size: 10
    # Topic parameters
    input_cloud_topic: "lidar_cloud_filtered"
    input_odom_topic: "odom"
    output_map_topic: "map"
